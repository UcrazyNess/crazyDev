<!DOCTYPE html>

<head>

    <!-- آیکون‌ها -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Vazirmatn', 'sans-serif'],
                        title: ['Lalezar', 'cursive'],
                        mono: ['Courier New', 'Courier', 'monospace'],

                    colors: {
                        'persian-blue': '#1C39BB',

                        'persian-cyan-dark': '#0097A7',
                        'dark-bg': '#0B0F19',
                        'dark-surface': '#151C2C',
                    },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',

                    keyframes: {
                        slideIn: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },

            background: rgba(21, 28, 44, 0.6);
            backdrop-filter: blur(12px);

            box-shadow: 0 0 20px rgba(28, 57, 187, 0.1);

        }

        .glow-box:hover {
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);

        .bg-pattern {

        }

        .input-field {

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;

            border-radius: 10px;
        }

            background: rgba(0, 229, 255, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {

    </style>
</head>
<body class="bg-dark-bg font-sans bg-pattern relative min-h-screen flex flex-col">

    <!-- هاله‌های نئونی پس‌زمینه -->

    <div class="fixed bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-persian-cyan opacity-10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <header class="w-full py-4 px-4 sm:px-8 flex justify-between items-center z-20 sticky top-0 backdrop-blur-xl border-b border-white/10 bg-dark-bg/80 shadow-lg">
        <div class="flex items-center gap-6">

        </div>
        <div class="flex items-center gap-4">

    <main class="flex-grow z-10 w-full max-w-7xl mx-auto px-4 sm:px-8 py-8 flex flex-col gap-8">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-dark-surface/50 border border-white/5 p-6 rounded-2xl">
            <div>
                <h1 class="text-2xl font-title text-white mb-1 flex items-center gap-2">
                    <i class="fas fa-layer-group text-purple-400"></i>
                    مدیریت فریم‌ورک‌ها
                </h1>
                <p class="text-gray-400 text-sm">لیست ابزارها و تکنولوژی‌های پشتیبانی شده در سیستم</p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <button onclick="exportAllFrameworks()" class="bg-dark-surface border border-white/10 hover:border-persian-cyan/50 text-persian-cyan hover:text-white px-4 py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 flex-1 md:flex-auto">

                </button>
                <button onclick="openAddModal()" class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow-lg shadow-purple-600/20 flex items-center justify-center gap-2 flex-1 md:flex-auto">

            </div>
        </div>

        <!-- کانتینر لیست فریم‌ورک‌ها -->

        </div>

        <div id="frameworks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Frameworks will be injected here via JS -->
        </div>

        <!-- دکمه Load More -->
        <div id="load-more-container" class="w-full flex justify-center mt-4 hidden">

    <!-- Framework Modal Layer -->
    <div id="framework-modal" class="fixed inset-0 z-50 hidden items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="bg-dark-bg border border-purple-500/30 shadow-2xl shadow-purple-900/20 rounded-2xl w-full max-w-2xl z-10 relative flex flex-col max-h-[90vh] animate-slide-in">
            
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-dark-surface/50 rounded-t-2xl">
                <h2 id="modal-title" class="text-2xl font-title text-white flex items-center gap-2">
                    <i class="fas fa-plus-circle text-purple-400"></i>
                    افزودن فریم‌ورک
                </h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto custom-scrollbar flex-grow">
                <form id="framework-form" class="space-y-5" onsubmit="event.preventDefault(); saveFramework();">
                    <input type="hidden" id="f-slug">
                    <input type="hidden" id="f-id">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2 font-medium">نام فریم‌ورک <span class="text-red-500">*</span></label>

                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2 font-medium">زبان برنامه‌نویسی <span class="text-red-500">*</span></label>
                            <input type="text" id="f-language" required minlength="2" maxlength="100" class="input-field" placeholder="مثال: PHP">
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-400 text-sm mb-2 font-medium">توضیحات</label>
                        <textarea id="f-desc" maxlength="1000" rows="3" class="input-field" placeholder="توضیحات کوتاه درباره فریم‌ورک..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2 font-medium">آدرس وب‌سایت</label>
                            <input type="url" id="f-website" class="input-field" placeholder="https://..." dir="ltr">
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2 font-medium">مخزن کد (Repository)</label>
                            <input type="url" id="f-repo" class="input-field" placeholder="https://github.com/..." dir="ltr">
                        </div>
                    </div>

                    <div class="flex items-center gap-3 bg-dark-surface p-4 rounded-xl border border-white/5">
                        <input type="checkbox" id="f-featured" class="w-5 h-5 rounded border-gray-600 text-purple-600 focus:ring-purple-600 bg-dark-bg cursor-pointer">
                        <label for="f-featured" class="text-gray-300 font-medium cursor-pointer select-none">فریم‌ورک ویژه (نمایش در صفحه اصلی)</label>
                    </div>

            </div>

            <div class="p-6 border-t border-white/5 bg-dark-surface/30 rounded-b-2xl flex justify-end gap-3">

                <button type="submit" form="framework-form" id="save-btn" class="bg-purple-600 hover:bg-purple-500 text-white font-bold px-6 py-2.5 rounded-xl transition-all shadow-lg shadow-purple-600/20 flex items-center gap-2">
                    <i class="fas fa-save"></i>
                    ذخیره اطلاعات
                </button>
            </div>
        </div>

    <!-- Commands Modal Layer -->
    <div id="commands-modal" class="fixed inset-0 z-[60] hidden items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeCommandsModal()"></div>
        
        <div class="bg-dark-bg border border-persian-cyan/20 shadow-2xl shadow-persian-cyan/10 rounded-2xl w-full max-w-6xl z-10 relative flex flex-col max-h-[95vh] h-[850px] animate-slide-in overflow-hidden">
            
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-dark-surface/50">

                    <i class="fas fa-terminal text-persian-cyan"></i>

                    <button onclick="exportCurrentFramework()" class="text-sm bg-persian-cyan/10 hover:bg-persian-cyan text-persian-cyan hover:text-dark-bg border border-persian-cyan/30 hover:border-persian-cyan px-4 py-2 rounded-lg transition-all flex items-center gap-2 font-bold shadow-lg shadow-persian-cyan/10" title="دانلود ساختار JSON این فریم‌ورک و دستورات آن">

                    <button onclick="closeCommandsModal()" class="text-gray-400 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5 bg-dark-bg border border-white/5">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row flex-grow overflow-hidden">
                <!-- Left: Form -->
                <div class="w-full lg:w-[45%] p-6 border-b lg:border-b-0 lg:border-l border-white/5 bg-dark-surface/30 overflow-y-auto custom-scrollbar">
                    <h3 id="cmd-form-title" class="text-lg font-bold text-gray-200 mb-5 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-persian-cyan"></i> افزودن دستور جدید
                    </h3>
                    
                    <form id="command-form" class="space-y-4" onsubmit="event.preventDefault(); saveCommand();">
                        <input type="hidden" id="c-id">
                        
                        <!-- نوع عملیات -->
                        <div>
                            <label class="block text-gray-400 text-xs mb-1.5 font-medium">نوع عملیات <span class="text-red-500">*</span></label>
                            <select id="c-action-type" required class="input-field py-2 text-sm" onchange="toggleFileFields()">

                                <option value="generate">ساخت فایل (Generate)</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-400 text-xs mb-1.5 font-medium">عنوان (Alias) <span class="text-red-500">*</span></label>

                            </div>
                            <div>
                                <label class="block text-gray-400 text-xs mb-1.5 font-medium">دستور (Command) <span class="text-red-500">*</span></label>
                                <input type="text" id="c-command" required maxlength="100" class="input-field py-2 text-sm font-mono text-persian-cyan" placeholder="php artisan make:controller" dir="ltr">
                            </div>
                        </div>

                        <div>
                            <label class="block text-gray-400 text-xs mb-1.5 font-medium">توضیحات</label>
                            <textarea id="c-desc" rows="2" class="input-field py-2 text-sm" placeholder="توضیح عملکرد این دستور..."></textarea>
                        </div>
                        
                        <!-- فیلدهای مخصوص ساخت فایل (Generate) -->
                        <div id="file-fields-container" class="hidden space-y-4 pt-4 border-t border-white/10 mt-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-400 text-xs mb-1.5 font-medium text-persian-cyan">نام فایل <span class="text-red-500">*</span></label>
                                    <input type="text" id="c-file-name" class="input-field py-2 text-sm border-persian-cyan/30" placeholder="مثال: UserController.php" dir="ltr">
                                </div>
                                <div>
                                    <label class="block text-gray-400 text-xs mb-1.5 font-medium text-persian-cyan">مسیر ساخت <span class="text-red-500">*</span></label>
                                    <input type="text" id="c-path" class="input-field py-2 text-sm border-persian-cyan/30" placeholder="مثال: app/Http/Controllers" dir="ltr">
                                </div>
                            </div>
                            <div>
                                <label class="block text-gray-400 text-xs mb-1.5 font-medium text-persian-cyan">محتوای فایل (Template) <span class="text-red-500">*</span></label>
                                <textarea id="c-file" rows="5" class="input-field py-2 text-sm font-mono text-gray-300 border-persian-cyan/30" placeholder="<?php\nnamespace App;\n..." dir="ltr"></textarea>
                            </div>
                        </div>

                        <div>
                            <label class="block text-gray-400 text-xs mb-1.5 font-medium mt-4">تنظیمات آپشن‌ها (JSON)</label>
                            <textarea id="c-options" rows="3" class="input-field py-2 text-sm font-mono" placeholder="{}" dir="ltr">{}</textarea>
                            <span class="text-[10px] text-gray-500 mt-1 block">مقادیر را با فرمت JSON معتبر وارد کنید.</span>
                        </div>

                        <div class="flex items-center gap-3 bg-dark-bg p-3 rounded-lg border border-white/5">
                            <input type="checkbox" id="c-featured" class="w-4 h-4 rounded border-gray-600 text-persian-cyan focus:ring-persian-cyan bg-dark-surface cursor-pointer">
                            <label for="c-featured" class="text-gray-300 text-sm font-medium cursor-pointer select-none">دستور ویژه (اجرای سریع)</label>
                        </div>

                        <div class="pt-4 flex gap-2">
                            <button type="submit" id="save-cmd-btn" class="flex-grow bg-persian-cyan hover:bg-persian-cyan-dark text-dark-bg font-bold px-4 py-2 rounded-lg transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-save"></i> ثبت دستور
                            </button>
                            <button type="button" onclick="resetCommandForm()" id="cancel-cmd-btn" class="hidden bg-dark-bg hover:bg-white/5 border border-white/10 text-gray-300 px-4 py-2 rounded-lg transition-all">
                                انصراف
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Right: List -->
                <div class="w-full lg:w-[55%] p-6 flex flex-col bg-dark-bg relative overflow-hidden">
                    <div id="commands-list-loading" class="absolute inset-0 bg-dark-bg/80 backdrop-blur-sm z-10 flex items-center justify-center hidden">
                        <i class="fas fa-circle-notch fa-spin text-3xl text-persian-cyan"></i>
                    </div>
                    
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-gray-200">لیست دستورات ثبت شده</h3>
                        <span id="cmd-count" class="bg-dark-surface border border-white/10 px-2 py-1 rounded text-xs font-mono text-gray-400">0 مورد</span>
                    </div>

                    <div id="commands-container" class="flex-grow overflow-y-auto custom-scrollbar space-y-3 pr-2">
                        <!-- Commands will render here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="fixed bottom-5 left-5 z-[100] flex flex-col gap-3"></div>

    <script>
        // API Configuration (Update these base URLs if necessary)
        const API_FRAMEWORKS = '/framework';
        const API_COMMANDS = '/command';

        // State Management
        let frameworks = [];
        let commands = [];
        let currentFrameworkId = null;
        let currentFrameworkSlug = null;
        let currentPage = 0;
        let hasMore = true;

        // ----- Toast Notification System -----
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-600/90 border-green-400' : 'bg-red-600/90 border-red-400';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `${bgColor} border backdrop-blur-sm text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-fade-in transform transition-all duration-300 ease-out translate-y-0 opacity-100`;
            toast.innerHTML = `
                <i class="fas ${icon} text-lg"></i>
                <span class="text-sm font-medium">${message}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ----- Frameworks Management -----
        async function fetchFrameworks(page = 0, append = false) {
            const spinner = document.getElementById('loading-spinner');
            const loadMoreBtn = document.getElementById('load-more-container');
            
            if (!append) {
                spinner.classList.remove('hidden');
                document.getElementById('frameworks-grid').innerHTML = '';
            }
            
            try {
                // Mock API call structure for frameworks (Modify as per your real backend)
                const response = await fetch(`${API_FRAMEWORKS}/?offset=${page * 10}`);
                if (!response.ok) throw new Error('خطا در دریافت اطلاعات');
                
                const data = await response.json(); 
                
                if (data.data) {
                    if (append) frameworks = [...frameworks, ...data.data];
                    else frameworks = data.data;
                    
                    hasMore = data.data.length === (data.limit || 10);
                    renderFrameworks();
                } else {
                    // Fallback if data format differs
                    frameworks = [];
                }
            } catch (error) {
                showToast('ارتباط با سرور برقرار نشد (لیست آزمایشی نمایش داده می‌شود)', 'error');
                // Mock Data injection on fail for visual test
                if (!append) frameworks = [
                    { id: '1', name: 'Laravel', language: 'PHP', description: 'The PHP Framework for Web Artisans.', slug: 'laravel', is_featured: true },
                    { id: '2', name: 'React', language: 'JavaScript', description: 'A JavaScript library for building user interfaces.', slug: 'react', is_featured: false }
                ];
                renderFrameworks();
                hasMore = false;
            } finally {
                spinner.classList.add('hidden');
                loadMoreBtn.classList.toggle('hidden', !hasMore);
            }
        }

        function renderFrameworks() {
            const grid = document.getElementById('frameworks-grid');
            grid.innerHTML = frameworks.map(fw => `
                <div class="glow-box p-6 rounded-2xl flex flex-col h-full relative group">
                    ${fw.is_featured ? '<div class="absolute -top-3 -right-3 bg-purple-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg shadow-purple-600/30 border border-purple-400 z-10">ویژه</div>' : ''}
                    
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-grow">
                            <h3 class="text-xl font-title text-white mb-1 group-hover:text-persian-cyan transition-colors">${fw.name}</h3>
                            <span class="text-xs bg-dark-bg border border-white/10 text-gray-300 px-2 py-1 rounded-md font-mono">${fw.language}</span>
                        </div>
                        
                        <div class="flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editFramework('${fw.id}')" class="w-8 h-8 rounded-lg bg-dark-bg border border-white/10 text-gray-400 hover:text-white hover:border-purple-500 transition-all flex items-center justify-center">
                                <i class="fas fa-edit text-sm"></i>
                            </button>
                            <button onclick="deleteFramework('${fw.id}')" class="w-8 h-8 rounded-lg bg-dark-bg border border-white/10 text-gray-400 hover:text-white hover:border-red-500 transition-all flex items-center justify-center">
                                <i class="fas fa-trash text-sm"></i>
                            </button>
                        </div>
                    </div>
                    
                    <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3">${fw.description || 'بدون توضیحات'}</p>
                    
                    <button onclick="openCommandsModal('${fw.id}', '${fw.slug}')" class="w-full bg-dark-bg border border-persian-cyan/30 text-persian-cyan hover:bg-persian-cyan hover:text-dark-bg py-2.5 rounded-xl transition-all font-bold flex items-center justify-center gap-2 group/btn">
                        <i class="fas fa-terminal group-hover/btn:animate-pulse"></i>
                        مدیریت دستورات
                    </button>
                </div>
            `).join('');
        }

        function loadMore() {
            if (hasMore) {
                currentPage++;
                fetchFrameworks(currentPage, true);
            }
        }

        // --- Framework Form Actions ---
        function openAddModal() {
            document.getElementById('framework-form').reset();
            document.getElementById('f-id').value = '';
            document.getElementById('modal-title').innerHTML = '<i class="fas fa-plus-circle text-purple-400"></i> افزودن فریم‌ورک';
            document.getElementById('framework-modal').classList.remove('hidden');
            document.getElementById('framework-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('framework-modal').classList.add('hidden');
            document.getElementById('framework-modal').classList.remove('flex');
        }

        function editFramework(id) {
            const fw = frameworks.find(f => f.id == id);
            if (!fw) return;

            document.getElementById('f-id').value = fw.id;
            document.getElementById('f-name').value = fw.name;
            document.getElementById('f-language').value = fw.language;
            document.getElementById('f-desc').value = fw.description || '';
            document.getElementById('f-website').value = fw.website || '';
            document.getElementById('f-repo').value = fw.repository || '';
            document.getElementById('f-featured').checked = fw.is_featured;

            document.getElementById('modal-title').innerHTML = '<i class="fas fa-edit text-purple-400"></i> ویرایش فریم‌ورک';
            document.getElementById('framework-modal').classList.remove('hidden');
            document.getElementById('framework-modal').classList.add('flex');
        }

        async function saveFramework() {
            const id = document.getElementById('f-id').value;
            const payload = {
                name: document.getElementById('f-name').value,
                language: document.getElementById('f-language').value,
                description: document.getElementById('f-desc').value,
                website: document.getElementById('f-website').value,
                repository: document.getElementById('f-repo').value,
                is_featured: document.getElementById('f-featured').checked
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_FRAMEWORKS}/${id}` : API_FRAMEWORKS;

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showToast(`فریم‌ورک با موفقیت ${id ? 'بروزرسانی' : 'ثبت'} شد`);
                    closeModal();
                    currentPage = 0;
                    fetchFrameworks();
                } else {
                    const data = await response.json();
                    showToast(data.error || 'خطا در ذخیره اطلاعات', 'error');
                }
            } catch (e) {
                showToast('خطا در برقراری ارتباط', 'error');
            }
        }

        async function deleteFramework(id) {
            if (!confirm('آیا از حذف این فریم‌ورک و تمامی دستورات آن اطمینان دارید؟')) return;
            try {
                const response = await fetch(`${API_FRAMEWORKS}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('فریم‌ورک با موفقیت حذف شد');
                    currentPage = 0;
                    fetchFrameworks();
                } else {
                    showToast('خطا در حذف فریم‌ورک', 'error');
                }
            } catch (e) {
                showToast('خطا در برقراری ارتباط', 'error');
            }
        }

        // ----- Commands Management -----
        function openCommandsModal(id, slug) {
            currentFrameworkId = id;
            currentFrameworkSlug = slug;
            document.getElementById('cmd-modal-title').innerHTML = `
                <i class="fas fa-terminal text-persian-cyan"></i>
                دستورات فریم‌ورک 
            `;
            document.getElementById('commands-modal').classList.remove('hidden');
            document.getElementById('commands-modal').classList.add('flex');
            
            resetCommandForm();
            fetchCommands();
        }

        function closeCommandsModal() {
            document.getElementById('commands-modal').classList.add('hidden');
            document.getElementById('commands-modal').classList.remove('flex');
            currentFrameworkId = null;
        }

        // Toggle UI based on action_type
        function toggleFileFields() {
            const type = document.getElementById('c-action-type').value;
            const fileFields = document.getElementById('file-fields-container');
            const fileInput = document.getElementById('c-file');
            const fileNameInput = document.getElementById('c-file-name');
            const pathInput = document.getElementById('c-path');

            if (type === 'generate') {
                fileFields.classList.remove('hidden');
                fileInput.required = true;
                fileNameInput.required = true;
                pathInput.required = true;
            } else {
                fileFields.classList.add('hidden');
                fileInput.required = false;
                fileNameInput.required = false;
                pathInput.required = false;
            }
        }

        async function fetchCommands() {
            document.getElementById('commands-list-loading').classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_COMMANDS}/?framework=${currentFrameworkSlug}`);
                if (!response.ok) throw new Error('خطا در دریافت دستورات');
                
                const data = await response.json();
                commands = data.data || [];
                renderCommands();
            } catch (error) {
                commands = [];
                renderCommands();
                showToast('مشکل در دریافت لیست دستورات', 'error');
            } finally {
                document.getElementById('commands-list-loading').classList.add('hidden');
            }
        }

        function renderCommands() {
            const container = document.getElementById('commands-container');
            document.getElementById('cmd-count').innerText = `${commands.length} مورد`;
            
            if (commands.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                        <p>هیچ دستوری ثبت نشده است.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = commands.map(cmd => `
                <div class="bg-dark-surface border border-white/5 p-4 rounded-xl hover:border-persian-cyan/30 transition-all flex flex-col gap-3 group">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h4 class="text-white font-bold text-sm">${cmd.alias}</h4>
                                ${cmd.is_featured ? '<span class="text-[10px] bg-persian-cyan/20 text-persian-cyan px-2 py-0.5 rounded border border-persian-cyan/30">ویژه</span>' : ''}
                                ${cmd.action_type === 'generate' ? '<span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded border border-green-500/30">ساخت فایل</span>' : '<span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded border border-blue-500/30">اجرایی</span>'}
                            </div>
                            <p class="text-xs text-gray-400 font-mono bg-dark-bg px-2 py-1 rounded inline-block" dir="ltr">${cmd.command}</p>
                        </div>
                        <div class="flex gap-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editCommand('${cmd.ID || cmd.id}')" class="w-7 h-7 bg-dark-bg hover:bg-white/10 text-gray-400 hover:text-white rounded flex items-center justify-center transition-colors">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteCommand('${cmd.ID || cmd.id}')" class="w-7 h-7 bg-dark-bg hover:bg-white/10 text-gray-400 hover:text-red-400 rounded flex items-center justify-center transition-colors">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </div>
                    ${cmd.description ? `<p class="text-xs text-gray-500 border-t border-white/5 pt-2">${cmd.description}</p>` : ''}
                </div>
            `).join('');
        }

        async function saveCommand() {
            const id = document.getElementById('c-id').value;
            let optionsStr = "{}";
            
            try {
                const optionsVal = document.getElementById('c-options').value;
                const parsed = optionsVal ? JSON.parse(optionsVal) : {};
                optionsStr = JSON.stringify(parsed); // ارسال به صورت String هماهنگ با ساختار دیتابیس
            } catch (e) {
                showToast('فرمت JSON آپشن‌ها نامعتبر است', 'error');
                return;
            }

            const actionType = document.getElementById('c-action-type').value;

            const payload = {
                alias: document.getElementById('c-alias').value,
                command: document.getElementById('c-command').value,
                action_type: actionType,
                framework_id: currentFrameworkId,
                description: document.getElementById('c-desc').value,
                options: optionsStr,
                is_featured: document.getElementById('c-featured').checked
            };

            if (actionType === 'generate') {
                payload.file_name = document.getElementById('c-file-name').value;
                payload.paths = document.getElementById('c-path').value;
                payload.file = document.getElementById('c-file').value;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_COMMANDS}/${id}` : API_COMMANDS;

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showToast(`دستور با موفقیت ${id ? 'ویرایش' : 'ثبت'} شد`);
                    resetCommandForm();
                    fetchCommands();
                } else {
                    const data = await response.json();
                    showToast(data.error || 'خطا در ثبت دستور', 'error');
                }
            } catch (e) {
                showToast('خطا در برقراری ارتباط', 'error');
            }
        }

        function editCommand(id) {
            const cmd = commands.find(c => (c.ID == id || c.id == id));
            if (!cmd) return;

            document.getElementById('cmd-form-title').innerHTML = '<i class="fas fa-edit text-persian-cyan"></i> ویرایش دستور';
            document.getElementById('c-id').value = cmd.ID || cmd.id;
            document.getElementById('c-alias').value = cmd.alias;
            document.getElementById('c-command').value = cmd.command;
            document.getElementById('c-desc').value = cmd.description || '';
            document.getElementById('c-options').value = typeof cmd.options === 'string' ? cmd.options : JSON.stringify(cmd.options || {});
            document.getElementById('c-featured').checked = cmd.is_featured;
            
            const actionType = cmd.action_type || 'execute';
            document.getElementById('c-action-type').value = actionType;
            
            if (actionType === 'generate') {
                document.getElementById('c-file-name').value = cmd.file_name || '';
                document.getElementById('c-path').value = cmd.paths || '';
                document.getElementById('c-file').value = cmd.file || ''; // Note: API should return file content if possible
            }
            
            toggleFileFields();

            document.getElementById('save-cmd-btn').innerHTML = '<i class="fas fa-save"></i> بروزرسانی';
            document.getElementById('cancel-cmd-btn').classList.remove('hidden');
        }

        function resetCommandForm() {
            document.getElementById('command-form').reset();
            document.getElementById('c-id').value = '';
            document.getElementById('c-options').value = '{}';
            document.getElementById('cmd-form-title').innerHTML = '<i class="fas fa-plus-circle text-persian-cyan"></i> افزودن دستور جدید';
            document.getElementById('save-cmd-btn').innerHTML = '<i class="fas fa-save"></i> ثبت دستور';
            document.getElementById('cancel-cmd-btn').classList.add('hidden');
            
            // Reset action type UI
            document.getElementById('c-action-type').value = 'execute';
            toggleFileFields();
        }

        async function deleteCommand(id) {
            if (!confirm('آیا از حذف این دستور اطمینان دارید؟')) return;
            try {
                const response = await fetch(`${API_COMMANDS}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('دستور با موفقیت حذف شد');
                    fetchCommands();
                    if(document.getElementById('c-id').value == id) resetCommandForm();
                } else {
                    showToast('خطا در حذف دستور', 'error');
                }
            } catch (e) {
                showToast('خطا در برقراری ارتباط', 'error');
            }
        }

        // ----- Exports -----
        function exportAllFrameworks() {
            showToast('در حال آماده‌سازی فایل JSON کل سیستم...', 'success');
            // Implement global export logic connecting to backend
        }

        function exportCurrentFramework() {
            if(!currentFrameworkId) return;
            showToast(`در حال دانلود JSON فریم‌ورک ${currentFrameworkSlug}...`, 'success');
             // Implement specific export logic
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchFrameworks();
        });
    </script>
</body>
</html>
